name: CI

on:
  push:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Git for private repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global url."https://${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Cache Android SDK components
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-androidsdk-v4
          restore-keys: |
            ${{ runner.os }}-androidsdk-v4-

      - name: Cache Android SDK licenses
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: ${{ runner.os }}-androidsdk-licenses-v1
          restore-keys: |
            ${{ runner.os }}-androidsdk-licenses-

      - name: Cache Flutter pub deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        shell: bash
        run: |
          sdkmanager "ndk;28.2.13676358" "cmake;3.22.1" "build-tools;35.0.0" "platforms;android-34" "platforms;android-35" "platforms;android-36" > /dev/null
          set +o pipefail
          yes | sdkmanager --licenses > /dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Setup Firebase config
        shell: bash
        run: |
          # Decode and write google-services.json
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 -d > android/app/google-services.json

      - name: Setup Keystore for release signing
        shell: bash
        run: |
          # Decode keystore file
          echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 -d > android/app/release-keystore.jks

          # Verify keystore was created
          ls -lh android/app/release-keystore.jks

          # Verify keystore password
          keytool -list -v -keystore android/app/release-keystore.jks -storepass '${{ secrets.KEYSTORE_PASSWORD }}'

          # Create key.properties
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF

          # Verify key.properties
          cat android/key.properties

      - name: Setup environment variables
        shell: bash
        run: |
          # Create .env file from secrets or use defaults
          cat > .env << EOF
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID=${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          HUGGINGFACE_TOKEN=${{ secrets.HUGGINGFACE_TOKEN }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY=${{ secrets.ONESIGNAL_API_KEY }}
          EOF

      - name: Build Android APK (Jobseeker)
        run: flutter build apk --release --flavor jobseeker -t lib/main_jobseeker.dart --split-per-abi

      - name: Build Android APK (Recruiter)
        run: flutter build apk --release --flavor recruiter -t lib/main_recruiter.dart --split-per-abi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          retention-days: 30
          path: build/app/outputs/flutter-apk/*.apk

  release:
    runs-on: ubuntu-latest
    if: ${{ needs.android.result == 'success' }}
    permissions:
      contents: write
    needs: [android]
    steps:
      - name: Compute tag name
        id: tag
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:12}"
          echo "tag_name=commit-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk

      - name: Archive artifacts
        run: |
          apk_path=$(find android-apk -maxdepth 1 -type f -name '*.apk' -print -quit 2>/dev/null || true)
          if [ -z "$apk_path" ]; then
            echo "No APK found in android-apk/"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          files: |
            android-apk/*.apk
